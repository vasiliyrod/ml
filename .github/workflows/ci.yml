name: CI — Autotests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Ruff Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff on src/
        run: ruff check src/ --line-length 120
